<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PK Budget vs Actual 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
#loginModal{overflow:auto;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a202c;font-size:12px;display:flex;flex-direction:column;}

/* ── FIXED TOP SECTION ── */
#topSection{flex-shrink:0;background:#f0f2f5;}

/* SETUP BANNER */
#setupBanner{background:#eff6ff;border-bottom:1px solid #bfdbfe;padding:7px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#setupBanner.hidden{display:none;}
.setup-lbl{font-size:10px;color:#1d4ed8;white-space:nowrap;}
.setup-inp{flex:1;min-width:240px;max-width:420px;background:#fff;border:1px solid #93c5fd;border-radius:5px;color:#1e3a8a;padding:5px 10px;font-size:11px;outline:none;font-family:'IBM Plex Mono',monospace;}
.guide-link{font-size:10px;color:#2563eb;cursor:pointer;text-decoration:underline;}
.sync-wrap{display:none;align-items:center;gap:5px;font-size:10px;font-family:'IBM Plex Mono',monospace;}
.sync-dot{width:6px;height:6px;border-radius:50%;}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.hdr-eyebrow{font-size:9px;letter-spacing:.22em;color:#3b82f6;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.hdr h1{font-size:16px;font-weight:700;color:#1a202c;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.btn-blue{background:#3b82f6;color:#fff;}.btn-blue:hover{background:#2563eb;}
.btn-out{background:#fff;color:#4b5563;border:1px solid #d1d5db;}.btn-out:hover{background:#f9fafb;}

/* MONTH BAR */
.month-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.month-bar-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;font-weight:600;}
.month-btns{display:flex;gap:3px;flex-wrap:wrap;}
.mb{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;border-radius:5px;padding:4px 11px;font-size:10px;font-weight:600;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.mb:hover{background:#e5e7eb;color:#374151;}
.mb.active{background:#3b82f6;color:#fff;border-color:#3b82f6;}
.mb.has-actual{border-color:#10b981;}
.mb.active{background:#3b82f6;color:#fff;border-color:#3b82f6;}
.ytd-badge{font-size:10px;color:#1d4ed8;font-family:'IBM Plex Mono',monospace;background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:4px 10px;white-space:nowrap;}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;padding:10px 24px;}
.sc{background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:11px 14px;}
.sc-lbl{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;font-weight:600;}
.sc-val{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.sc-sub{font-size:9px;color:#9ca3af;margin-top:1px;}

/* CONTROLS BAR */
.controls{padding:0 24px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:260px;}
.search-wrap input{width:100%;background:#fff;border:1px solid #d1d5db;border-radius:7px;color:#374151;padding:6px 8px 6px 28px;font-size:11px;outline:none;font-family:'Noto Sans KR',sans-serif;}
.search-wrap input:focus{border-color:#3b82f6;}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:12px;pointer-events:none;}
.flt{background:#fff;color:#6b7280;border:1px solid #d1d5db;border-radius:6px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.flt.on{background:#3b82f6;color:#fff;border-color:#3b82f6;}
.dept-lbl{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;font-weight:600;white-space:nowrap;}
.dc{background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:14px;padding:3px 11px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.dc.on{background:#3b82f6;color:#fff;border-color:#3b82f6;font-weight:600;}
.dc-ghost{background:transparent;color:#9ca3af;border:1px dashed #d1d5db;border-radius:14px;padding:3px 11px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.dc-ghost:hover{border-color:#3b82f6;color:#3b82f6;}
.dc-add-wrap{display:none;align-items:center;gap:4px;}
.dc-add-wrap.open{display:flex;}
.dc-add-inp{background:#fff;border:1px solid #3b82f6;border-radius:14px;color:#374151;padding:3px 10px;font-size:10px;outline:none;width:85px;font-family:'Noto Sans KR',sans-serif;}

/* MISS ALERT */
.miss-alert{margin:0 24px 8px;background:#fffbeb;border:1px solid #fcd34d;border-radius:7px;padding:7px 12px;font-size:10px;color:#92400e;display:none;}

/* ── SCROLLABLE CONTENT ── */
#scrollContent{flex:1;overflow-y:auto;overflow-x:auto;padding:0 24px 40px;}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;padding:9px 16px;border-radius:8px;font-weight:700;font-size:12px;z-index:9999;display:flex;align-items:center;gap:6px;box-shadow:0 4px 20px rgba(0,0,0,.15);pointer-events:none;}

/* ── TABLE ── */
table{width:100%;border-collapse:separate;border-spacing:0;min-width:1200px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}

/* THEAD STICKY within scroll container */
thead tr th{position:sticky;background:#f8fafc;}
.gh-row th{top:0;padding:6px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:none;text-align:center;z-index:20;}
.gh-fixed{text-align:left!important;color:#6b7280;}
.gh-total{background:#f0f9ff!important;color:#0369a1;}
.gh-ytd{background:#f0fdf4!important;color:#166534;}
.ch-row th{top:31px;padding:8px 10px;font-size:10px;font-weight:700;color:#374151;border-bottom:2px solid #e2e8f0;white-space:nowrap;letter-spacing:.02em;z-index:20;}
.ch-row th.r{text-align:right;}
.ch-row th.total-h{background:#f0f9ff!important;color:#0369a1;}
.ch-row th.ytd-h{background:#f0fdf4!important;color:#166534;}

/* ROWS */
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;}
.io-row{background:#f8fafc;cursor:pointer;}
.io-row:hover{background:#f1f5f9;}
.io-row td{padding:9px 10px;font-size:11px;font-weight:600;color:#1e293b;border-bottom:1px solid #e2e8f0;}
.io-expand{color:#94a3b8;font-size:10px;margin-right:5px;}
.io-name-text{color:#334155;}
.io-num-cell{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#475569;}
.io-count{font-size:9px;color:#94a3b8;font-weight:400;margin-left:6px;}
.item-row{background:#fff;cursor:pointer;}
.item-row:hover{background:#f8faff;}
.item-row.open-row{background:#eff6ff;}
.item-row td{padding:7px 10px;font-size:11px;color:#374151;}
.cmt-row td{padding:0;background:#f0f9ff;border-bottom:2px solid #bfdbfe;}
td.r{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;}
.num-zero{color:#d1d5db;}
.c-over{color:#dc2626;font-weight:600;}
.c-under{color:#059669;font-weight:600;}
.c-neutral{color:#6b7280;}
.total-col{background:#f0f9ff44;}
.ytd-col{background:#f0fdf444;}
.assign-cell{cursor:pointer;}
.assign-name{font-size:11px;color:#334155;}
.assign-pills{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap;}
.pill-miss{font-size:8px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:3px;padding:1px 5px;}
.pill-cmt{font-size:8px;background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;border-radius:3px;padding:1px 5px;}
.pct-badge{display:inline-block;font-size:9px;font-family:'IBM Plex Mono',monospace;border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle;}
.pct-over{background:#fee2e2;color:#dc2626;}
.pct-under{background:#dcfce7;color:#059669;}
.pct-ok{background:#e0f2fe;color:#0369a1;}

/* COMMENT PANEL */
.cmt-panel{padding:12px 16px 14px;}
.cmt-existing{background:#fff;border-radius:7px;padding:9px 12px;margin-bottom:8px;border-left:3px solid #3b82f6;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.cmt-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;flex-wrap:wrap;gap:3px;}
.cmt-dept{font-size:10px;font-weight:700;color:#2563eb;}
.cmt-time{font-size:9px;color:#9ca3af;font-family:'IBM Plex Mono',monospace;}
.cmt-btn{background:transparent;color:#9ca3af;border:none;font-size:11px;cursor:pointer;padding:1px 3px;}
.cmt-btn:hover{color:#374151;}
.cmt-text{font-size:11px;color:#4b5563;line-height:1.6;}
.cmt-edit-ta{width:100%;background:#fff;border:1px solid #3b82f6;border-radius:5px;color:#374151;padding:7px;font-size:11px;resize:none;outline:none;font-family:'Noto Sans KR',sans-serif;margin-top:4px;}
.cmt-edit-acts{display:flex;gap:4px;margin-top:5px;}
.cmt-edit-save{background:#3b82f6;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cmt-edit-cancel{background:#fff;color:#6b7280;border:1px solid #d1d5db;border-radius:5px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cmt-new-lbl{font-size:10px;color:#6b7280;margin-bottom:5px;}
.cmt-new-lbl span{color:#2563eb;font-weight:700;}
.cmt-new-wrap{display:flex;gap:7px;align-items:flex-end;}
.cmt-new-ta{flex:1;background:#fff;border:1px solid #d1d5db;border-radius:7px;color:#374151;padding:8px 10px;font-size:11px;resize:none;outline:none;font-family:'Noto Sans KR',sans-serif;}
.cmt-new-ta:focus{border-color:#3b82f6;}
.cmt-save{background:#3b82f6;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:11px;font-weight:600;cursor:pointer;height:38px;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.cmt-save:hover{background:#2563eb;}
.cmt-save.saved{background:#10b981;}
</style>
</head>
<body>

<div id="toast" class="toast" style="display:none;"></div>

<!-- LOGIN MODAL -->
<div id="loginModal" style="position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;padding:32px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25);">
    <div style="font-size:10px;letter-spacing:.2em;color:#3b82f6;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-bottom:6px;">PK Korea · FY 2026</div>
    <h2 style="font-size:18px;font-weight:700;color:#1a202c;margin-bottom:4px;">Budget vs Actual</h2>
    <p style="font-size:11px;color:#9ca3af;margin-bottom:24px;">부서를 선택하고 비밀번호를 입력하세요</p>
    <div style="margin-bottom:12px;">
      <label style="font-size:10px;color:#6b7280;font-weight:600;display:block;margin-bottom:4px;">부서 선택</label>
      <select id="loginDept" style="width:100%;border:1px solid #d1d5db;border-radius:7px;padding:8px 10px;font-size:12px;color:#374151;outline:none;font-family:'Noto Sans KR',sans-serif;background:#fff;">
        <option value="">-- 선택 --</option>
        <option value="HR팀">HR팀</option>
        <option value="영업팀">영업팀</option>
        <option value="마케팅팀">마케팅팀</option>
        <option value="재무팀">재무팀</option>
        <option value="IT팀">IT팀</option>
        <option value="admin">관리자</option>
      </select>
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:10px;color:#6b7280;font-weight:600;display:block;margin-bottom:4px;">비밀번호</label>
      <input id="loginPw" type="password" placeholder="비밀번호 입력"
        style="width:100%;border:1px solid #d1d5db;border-radius:7px;padding:8px 10px;font-size:12px;color:#374151;outline:none;font-family:'Noto Sans KR',sans-serif;"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="loginErr" style="font-size:11px;color:#dc2626;margin-bottom:10px;display:none;">비밀번호가 올바르지 않습니다.</div>
    <button onclick="doLogin()" style="width:100%;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">로그인</button>
  </div>
</div>

<!-- FIXED TOP -->
<div id="topSection">

  <!-- SHEETS CONNECT BAR - always visible -->
  <div id="setupBanner" style="background:#eff6ff;border-bottom:1px solid #bfdbfe;padding:7px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="font-size:10px;color:#1d4ed8;white-space:nowrap;font-weight:600;">🔗 Google Sheets 연동:</span>
    <input class="setup-inp" id="scriptUrl" placeholder="Apps Script URL 붙여넣기 (https://script.google.com/macros/s/.../exec)"
      style="flex:1;min-width:300px;max-width:500px;background:#fff;border:1px solid #93c5fd;border-radius:5px;color:#1e3a8a;padding:5px 10px;font-size:11px;outline:none;font-family:'IBM Plex Mono',monospace;"/>
    <button class="btn btn-blue" style="padding:5px 14px;font-size:11px;" onclick="connectSheets()">연결</button>
    <div id="syncWrap" style="display:none;align-items:center;gap:6px;font-size:11px;">
      <span id="syncDot" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:#10b981;"></span>
      <span id="syncTxt" style="color:#065f46;font-weight:600;"></span>
      <button class="btn btn-out" style="padding:3px 9px;font-size:10px;" onclick="loadComments()">🔄 새로고침</button>
      <button class="btn btn-out" style="padding:3px 9px;font-size:10px;color:#dc2626;border-color:#fca5a5;" onclick="disconnectSheets()">연결 해제</button>
    </div>
  </div>

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">PK Korea · Internal Order · FY 2026</div>
      <h1>Budget vs Actual</h1>
    </div>
    <div class="hdr-right">
      <div id="userBadge" style="display:none;align-items:center;gap:8px;font-size:11px;color:#374151;background:#f1f5f9;border-radius:20px;padding:4px 12px;">
        <span>👤</span><span id="userNameTxt"></span>
        <button onclick="doLogout()" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:10px;padding:0;margin-left:4px;">로그아웃</button>
      </div>
      <button class="btn btn-out" onclick="exportCSV()">⬇ CSV 내보내기</button>
    </div>
  </div>

  <!-- MONTH BAR -->
  <div class="month-bar">
    <span class="month-bar-lbl">기준 월 (YTD):</span>
    <div class="month-btns" id="monthBtns"></div>
    <div class="ytd-badge" id="ytdBadge"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary" id="summaryEl"></div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input id="searchInput" placeholder="IO#, IO명, Assignment 검색..." oninput="applyFilter()"/>
    </div>
    <button class="flt on" id="f-all"     onclick="setFlt('all')">전체</button>
    <button class="flt"    id="f-over"    onclick="setFlt('over')">예산 초과</button>
    <button class="flt"    id="f-under"   onclick="setFlt('under')">예산 절감</button>
    <button class="flt"    id="f-missing" onclick="setFlt('missing')">코멘트 미작성</button>
    <span class="dept-lbl">부서:</span>
    <div id="deptChips"></div>
    <div class="dc-add-wrap" id="deptAddWrap">
      <input class="dc-add-inp" id="deptAddInp" placeholder="부서명" onkeydown="deptKey(event)"/>
      <button class="btn btn-blue" style="border-radius:14px;padding:3px 9px;font-size:10px;" onclick="addDept()">추가</button>
      <button class="btn btn-out" style="border-radius:14px;padding:3px 7px;font-size:10px;" onclick="closeDeptAdd()">취소</button>
    </div>
    <button class="dc-ghost" id="deptAddBtn" onclick="openDeptAdd()">+ 부서 추가</button>
    <button class="btn btn-out" style="padding:4px 10px;font-size:10px;margin-left:4px;" onclick="toggleDeptCmtPanel()">💬 코멘트</button>
  </div>

  <!-- DEPT COMMENT PANEL -->
  <div id="deptCmtSection" style="display:none;margin:0 24px 8px;background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:11px;font-weight:700;color:#1e293b;" id="deptCmtTitle">HR팀 코멘트</span>
      <button onclick="toggleDeptCmtPanel()" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px;">✕</button>
    </div>
    <div id="deptCmtList" style="margin-bottom:10px;"></div>
    <div style="display:flex;gap:8px;align-items:flex-end;">
      <textarea id="deptCmtInput" rows="2" placeholder="부서 전체 코멘트를 입력하세요 (월별 누적)..."
        style="flex:1;background:#fff;border:1px solid #d1d5db;border-radius:7px;color:#374151;padding:8px 10px;font-size:11px;resize:none;outline:none;font-family:'Noto Sans KR',sans-serif;"
        onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#d1d5db'"></textarea>
      <button onclick="saveDeptCmt()" style="background:#3b82f6;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:11px;font-weight:600;cursor:pointer;height:38px;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;">저장</button>
    </div>
  </div>

  <!-- MISS ALERT -->
  <div class="miss-alert" id="missAlert"></div>

</div><!-- end topSection -->

<!-- SCROLLABLE TABLE -->
<div id="scrollContent">
  <table id="mainTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>

// ══════════════════════════════════════════════════
// DATA
// actual_m1 = Jan 2026 (col header "1")
// actual_m2 = Feb 2026 (col header "2")

// ══ UTILS ══
const fmt=n=>{if(n===0)return '-';return new Intl.NumberFormat('ko-KR').format(Math.round(n));};
const fmtN=n=>new Intl.NumberFormat('ko-KR').format(Math.round(n));
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escA=s=>String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

function pctBadge(actual, budget, label='') {
  if(budget===0) return actual>0?`<span class="pct-badge pct-over">+∞%</span>`:'';
  const p = (actual/budget*100);
  const cls = p>105?'pct-over':p<95?'pct-under':'pct-ok';
  return `<span class="pct-badge ${cls}">${p.toFixed(0)}%</span>`;
}

function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=(err?'🗑 ':'✓ ')+msg;
  el.style.cssText=`display:flex;background:${err?'#fca5a5':'#6ee7b7'};color:#1a202c;`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2200);
}

// GET-only API (CORS 문제 완전 해결)
async function apiGet(action) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    window[cbName] = (data) => {
      resolve(data);
      if(document.head.contains(script)) document.head.removeChild(script);
      delete window[cbName];
    };
    script.onerror = () => reject(new Error('Script load error'));
    script.src = `${scriptUrl}?action=${action}&callback=${cbName}&t=${Date.now()}`;
    document.head.appendChild(script);
    setTimeout(() => { reject(new Error('Timeout')); }, 15000);
  });
}

async function apiPost(body) {
  // POST 대신 GET 파라미터로 전송 (CORS 우회)
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    window[cbName] = (data) => {
      resolve(data);
      if(document.head.contains(script)) document.head.removeChild(script);
      delete window[cbName];
    };
    script.onerror = () => reject(new Error('Script load error'));
    // URL 파라미터로 데이터 전송
    const params = new URLSearchParams();
    Object.keys(body).forEach(k => params.append(k, body[k]));
    params.append('callback', cbName);
    params.append('t', Date.now());
    script.src = `${scriptUrl}?${params.toString()}`;
    document.head.appendChild(script);
    setTimeout(() => { resolve({success:true}); }, 15000);
  });
}

async function loadComments(){
  if(!connected)return;
  setSyncStatus('syncing');
  try{
    const data=await apiGet('getComments');

    // 응답이 비어있거나 오류면 기존 코멘트 유지
    if(!data || data.error || !Array.isArray(data)){
      setSyncStatus('err');
      toast('서버 응답 오류 - 기존 코멘트 유지', true);
      return;
    }

    // 기존 로컬 코멘트 전체 백업
    const backup = JSON.parse(JSON.stringify(comments));

    // 서버 데이터로 새 comments 구성
    const fresh = {};
    data.forEach(c=>{
      const k=ckey(c.io, c.assignment); // assignment가 'IO_LEVEL'이든 뭐든 io만 사용됨
      if(!fresh[k])fresh[k]=[];
      fresh[k].push({dept:c.dept,text:c.text,time:c.time,_row:c._row});
    });

    // 로컬에만 있는 코멘트(아직 서버에 미반영) 병합
    Object.keys(backup).forEach(k=>{
      backup[k].forEach(lc=>{
        const inFresh = fresh[k] && fresh[k].some(sc=>
          sc.text===lc.text && sc.dept===lc.dept
        );
        if(!inFresh){
          if(!fresh[k])fresh[k]=[];
          fresh[k].push(lc);
        }
      });
    });

    comments = fresh;
    setSyncStatus('ok');
    render();
  }catch(e){
    // 오류 시 기존 코멘트 절대 지우지 않음
    setSyncStatus('err');
    toast('새로고침 실패 - 기존 코멘트 유지됩니다', true);
  }
}

function connectSheets(){
  const url=document.getElementById('scriptUrl').value.trim();
  if(!url.includes('script.google.com')){toast('올바른 URL을 입력해주세요',true);return;}
  scriptUrl=url;localStorage.setItem(SCRIPT_KEY,url);connected=true;
  document.getElementById('syncWrap').style.display='flex';
  document.getElementById('scriptUrl').style.borderColor='#86efac';
  loadComments();
  // 30초마다 자동 동기화 시작
  if(!window._syncTimer){
    window._syncTimer = setInterval(()=>{ if(connected) loadComments(); }, 30000);
  }
}

// 해당 IO가 현재 사용자에게 보이는지
function canSeeIO(io){
  if(!currentUser)return false;
  if(isAdmin())return true;
  return IO_DEPT_MAP[io]===myDept();
}
function visibleRows(){
  const q=searchQ.toLowerCase();
  return RAW.filter(r=>{
    if(!canSeeIO(r.io))return false;
    if(q&&!r.io.includes(q)&&!r.name.toLowerCase().includes(q)&&!r.assignment.toLowerCase().includes(q))return false;
    const aY=actualYTD(r),bY=budgetYTD(r);
    if(fltMode==='missing'){
      const dept=IO_DEPT_MAP[r.io]||'기타';
      return !deptComments[dept]||deptComments[dept].length===0;
    }
    if(fltMode==='over')return aY>bY;
    if(fltMode==='under')return aY<bY&&bY>0;
    return true;
  });
}
function setFlt(m){fltMode=m;['all','over','under','missing'].forEach(x=>document.getElementById('f-'+x).classList.toggle('on',x===m));render();}

function renderTable(){
  const rows=visibleRows();
  const mn=MONTHS[selMonth];

  document.getElementById('tableHead').innerHTML=`
    <tr class="gh-row">
      <th class="gh-fixed" colspan="3" style="text-align:left;padding-left:14px;"></th>
      <th class="gh-total" colspan="3" style="border-left:2px solid #bae6fd;">Annual Total</th>
      <th class="gh-ytd" colspan="3" style="border-left:2px solid #bbf7d0;">YTD — Jan → ${mn}</th>
    </tr>
    <tr class="ch-row">
      <th style="width:80px;padding-left:14px;">IO#</th>
      <th style="min-width:190px;">Internal Order</th>
      <th style="min-width:160px;">Assignment</th>
      <th class="r total-h" style="width:120px;border-left:2px solid #bae6fd;">Budget</th>
      <th class="r total-h" style="width:120px;">Actual (Jan+Feb)</th>
      <th class="r total-h" style="width:120px;">Variance</th>
      <th class="r ytd-h" style="width:110px;border-left:2px solid #bbf7d0;">Budget YTD</th>
      <th class="r ytd-h" style="width:130px;">Actual YTD</th>
      <th class="r ytd-h" style="width:120px;">Variance YTD</th>
    </tr>`;

  if(!rows.length){
    document.getElementById('tableBody').innerHTML=`<tr><td colspan="9" style="text-align:center;padding:50px;color:#9ca3af;">검색 결과 없음</td></tr>`;
    return;
  }

  // group by IO
  const groups={};const ioOrder=[];
  rows.forEach(r=>{
    if(!groups[r.io]){groups[r.io]={name:r.name,rows:[]};ioOrder.push(r.io);}
    groups[r.io].rows.push(r);
  });

  let html='';
  ioOrder.forEach(io=>{
    const g=groups[io];
    const sBt=g.rows.reduce((s,r)=>s+r.budget_total,0);
    const sAt=g.rows.reduce((s,r)=>s+r.actual_total,0);
    const sByt=g.rows.reduce((s,r)=>s+budgetYTD(r),0);
    const sAyt=g.rows.reduce((s,r)=>s+actualYTD(r),0);
    const sVt=sAt-sBt, sVy=sAyt-sByt;
    const cVt=sVt>0?'c-over':sVt<0?'c-under':'c-neutral';
    const cVy=sVy>0?'c-over':sVy<0?'c-under':'c-neutral';
    const isOpen=openIOs.has(io);
    const cmtCount=0; // 코멘트는 부서 레벨로 이동
    const missCount=0;

    const ioKey=io;
    const isIoRowOpen=openRows.has(ioKey);
    html+=`<tr class="io-row" id="tr_io_${esc(io)}">
      <td style="padding-left:14px;cursor:pointer;" class="io-num-cell" onclick="toggleIO('${escA(io)}')">${io}</td>
      <td colspan="2" style="cursor:pointer;" onclick="toggleIO('${escA(io)}')">
        <span class="io-expand">${isOpen?'▼':'▶'}</span>
        <span class="io-name-text">${esc(g.name)}</span>
        <span class="io-count">${g.rows.length}개 항목</span>
      </td>
      <td class="r total-col" style="border-left:2px solid #bae6fd;font-weight:700;">${fmtN(sBt)}</td>
      <td class="r total-col" style="font-weight:700;">${fmtN(sAt)}&nbsp;${pctBadge(sAt,sBt)}</td>
      <td class="r total-col ${cVt}">${(sVt>=0?'+':'')+fmtN(sVt)}</td>
      <td class="r ytd-col" style="border-left:2px solid #bbf7d0;font-weight:700;">${fmtN(sByt)}</td>
      <td class="r ytd-col" style="font-weight:700;">${fmtN(sAyt)}&nbsp;${pctBadge(sAyt,sByt)}</td>
      <td class="r ytd-col ${cVy}">${(sVy>=0?'+':'')+fmtN(sVy)}</td>
    </tr>`;

    // ITEM ROWS (only shown if IO is open)
    if(isOpen){
      g.rows.forEach(r=>{
        const k=ckey(r.io,r.assignment);
        const bYv=budgetYTD(r),aYv=actualYTD(r);
        const vT=r.actual_total-r.budget_total,vY=aYv-bYv;
        const cVt2=vT>0?'c-over':vT<0?'c-under':'c-neutral';
        const cVy2=vY>0?'c-over':vY<0?'c-under':'c-neutral';

        html+=`<tr class="item-row" id="tr_${esc(k)}">
          <td style="padding-left:28px;color:#9ca3af;font-size:10px;border-left:3px solid #e0f2fe;">↳</td>
          <td></td>
          <td class="assign-cell">
            <div class="assign-name">${esc(r.assignment)}</div>
          </td>
          <td class="r total-col" style="border-left:2px solid #e0f2fe;">${fmt(r.budget_total)}</td>
          <td class="r total-col">${fmt(r.actual_total)}&nbsp;${pctBadge(r.actual_total,r.budget_total)}</td>
          <td class="r total-col ${cVt2}">${vT!==0?(vT>0?'+':'')+fmtN(vT):'-'}</td>
          <td class="r ytd-col" style="border-left:2px solid #dcfce7;">${fmt(bYv)}</td>
          <td class="r ytd-col">${fmt(aYv)}&nbsp;${pctBadge(aYv,bYv)}</td>
          <td class="r ytd-col ${cVy2}">${vY!==0?(vY>0?'+':'')+fmtN(vY):'-'}</td>
        </tr>`;
      });
    }
  });

  document.getElementById('tableBody').innerHTML=html;
}

function toggleIO(io){
  openIOs.has(io)?openIOs.delete(io):openIOs.add(io);
  renderTable();
}

function toggleIORow(k, io){
  // 코멘트 패널 토글 (IO 행의 댓글 영역)
  const ta=document.getElementById('ta_'+k);
  if(ta)drafts[k]=ta.value;
  openRows.has(k)?openRows.delete(k):openRows.add(k);
  editState=null;renderTable();
}

async function saveIOCmt(k, io){
  const ta=document.getElementById('ta_'+k);
  const text=ta?ta.value.trim():'';
  if(!text)return;
  const time=new Date().toLocaleString('ko-KR');
  if(!comments[k])comments[k]=[];
  comments[k].push({dept:activeDept,text,time,_row:0});
  drafts[k]='';savedState[k]=true;
  renderTable();renderSummary();renderMissAlert();
  toast('저장됐습니다.');
  setTimeout(()=>{savedState[k]=false;renderTable();},1500);
  if(connected){
    try{
      await apiPost({action:'addComment',io,assignment:'IO_LEVEL',dept:activeDept,text,time});
    }catch(e){
      toast('⚠️ 서버 저장 실패 - 로컬에만 저장됨',true);
    }
  }
}

function renderDeptCmtPanel(){
  document.getElementById('deptCmtTitle').textContent=activeDept+' 코멘트';
  const list=deptComments[activeDept]||[];
  const mn=MONTHS[selMonth];
  if(list.length===0){
    document.getElementById('deptCmtList').innerHTML='<div style="font-size:11px;color:#9ca3af;padding:4px 0;">아직 작성된 코멘트가 없습니다.</div>';
  } else {
    document.getElementById('deptCmtList').innerHTML=list.map((c,i)=>`
      <div style="background:#f8fafc;border-left:3px solid #3b82f6;border-radius:5px;padding:8px 12px;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
          <span style="font-size:10px;font-family:'IBM Plex Mono',monospace;color:#6b7280;">${esc(c.month)} · ${esc(c.time)}</span>
          <button onclick="delDeptCmt('${escA(activeDept)}',${i})" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:11px;padding:0 2px;">🗑</button>
        </div>
        <div style="font-size:11px;color:#374151;line-height:1.6;">${esc(c.text)}</div>
      </div>`).join('');
  }
}

function saveDeptCmt(){
  const ta=document.getElementById('deptCmtInput');
  const text=ta?ta.value.trim():'';
  if(!text)return;
  const time=new Date().toLocaleString('ko-KR');
  const month=MONTHS[selMonth];
  if(!deptComments[activeDept])deptComments[activeDept]=[];
  deptComments[activeDept].push({text,time,month});
  ta.value='';
  renderDeptCmtPanel();
  renderSummary();
  toast('코멘트가 저장됐습니다.');
  if(connected){
    try{ apiPost({action:'addDeptComment',dept:activeDept,text,time,month}); }catch(e){}
  }
}

function delDeptCmt(dept,idx){
  if(!deptComments[dept])return;
  deptComments[dept].splice(idx,1);
  renderDeptCmtPanel();
  renderSummary();
  toast('삭제됐습니다.',true);
}

async function saveCmt(k,io,assignment){
  const ta=document.getElementById('ta_'+k);
  const text=ta?ta.value.trim():'';
  if(!text)return;
  const time=new Date().toLocaleString('ko-KR');
  if(!comments[k])comments[k]=[];
  // 로컬에 즉시 추가 (화면 즉시 반영)
  comments[k].push({dept:activeDept,text,time,_row:0});
  drafts[k]='';savedState[k]=true;
  renderTable();renderSummary();renderMissAlert();
  toast('저장됐습니다.');
  setTimeout(()=>{savedState[k]=false;renderTable();},1500);
  // 구글 시트에 백그라운드 저장 (성공해도 화면 reload 안 함 - 깜빡임 방지)
  if(connected){
    try{
      await apiPost({action:'addComment',io,assignment,dept:activeDept,text,time});
      // 저장 성공 - 로컬 상태 유지, reload 하지 않음
    }catch(e){
      toast('⚠️ 서버 저장 실패 - 로컬에만 저장됨',true);
    }
  }
}

function startEdit(k,idx){editState={key:k,idx};renderTable();setTimeout(()=>document.getElementById(`eta_${k}_${idx}`)?.focus(),50);}
function cancelEdit(){editState=null;renderTable();}

async function saveEdit(k,idx,row){
  const ta=document.getElementById(`eta_${k}_${idx}`);
  const text=ta?ta.value.trim():'';
  if(!text)return;
  const newTime=comments[k][idx].time+' (수정됨)';
  comments[k][idx]={...comments[k][idx],text,time:newTime};
  editState=null;renderTable();toast('수정됐습니다.');
  if(connected&&row>0)try{await apiPost({action:'editComment',row,text,time:newTime});}catch(e){}
}

async function delCmt(k,idx,row){
  comments[k].splice(idx,1);
  renderTable();renderSummary();renderMissAlert();toast('삭제됐습니다.',true);
  // 로컬 즉시 반영, 서버는 백그라운드 처리
  if(connected&&row>0)try{await apiPost({action:'deleteComment',row});}catch(e){}
}

function openDeptAdd(){document.getElementById('deptAddWrap').classList.add('open');document.getElementById('deptAddBtn').style.display='none';setTimeout(()=>document.getElementById('deptAddInp')?.focus(),50);}
function closeDeptAdd(){document.getElementById('deptAddWrap').classList.remove('open');document.getElementById('deptAddBtn').style.display='';if(document.getElementById('deptAddInp'))document.getElementById('deptAddInp').value='';}
function deptKey(e){if(e.key==='Enter')addDept();if(e.key==='Escape')closeDeptAdd();}
function addDept(){const v=document.getElementById('deptAddInp').value.trim();if(!v||departments.includes(v))return;departments.push(v);activeDept=v;closeDeptAdd();renderDepts();}

function exportCSV(){
  const mn=MONTHS[selMonth];
  const rows=['\uFEFFIO#,Internal Order,Assignment,Budget Annual,Actual(Jan+Feb),Variance Total,Budget YTD('+mn+'),Actual YTD('+mn+'),Variance YTD,부서,코멘트,작성시간'];
  // IO별로 그룹핑
  const ioGroups={};
  RAW.forEach(r=>{
    if(!ioGroups[r.io])ioGroups[r.io]={name:r.name,items:[],bT:0,aT:0};
    ioGroups[r.io].items.push(r);
    ioGroups[r.io].bT+=r.budget_total;
    ioGroups[r.io].aT+=r.actual_total;
  });
  Object.keys(ioGroups).forEach(io=>{
    const g=ioGroups[io];
    const bY=g.items.reduce((s,r)=>s+budgetYTD(r),0);
    const aY=g.items.reduce((s,r)=>s+actualYTD(r),0);
    const vT=g.aT-g.bT, vY=aY-bY;
    const rc=getCmts(io,'');
    if(rc.length===0){rows.push(`"${io}","${g.name}","(IO 전체)",${g.bT},${g.aT},${vT},${bY},${aY},${vY},"","(미작성)",""`); }
    else rc.forEach((c,i)=>rows.push(`"${i===0?io:''}","${i===0?g.name:''}","${i===0?'(IO 전체)':''}",${i===0?g.bT:''},${i===0?g.aT:''},${i===0?vT:''},${i===0?bY:''},${i===0?aY:''},${i===0?vY:''},"${c.dept}","${c.text.replace(/"/g,'""')}","${c.time}"`));
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download=`PK_BudgetActual_YTD${mn}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();toast('CSV 내보내기 완료!');
}


function updateStickyTop() {
  const banner = document.getElementById('setupBanner');
  const hdr = document.querySelector('.hdr');
  const monthBar = document.querySelector('.month-bar');
  const thead = document.querySelector('thead');
  if (!thead) return;
  
  let top = 0;
  if (banner && !banner.classList.contains('hidden')) {
    top += banner.offsetHeight;
  }
  if (hdr) top += hdr.offsetHeight;
  if (monthBar) top += monthBar.offsetHeight;
  thead.style.top = top + 'px';
}

// Also update month-bar and hdr sticky tops
function updateAllStickyTops() {
  const banner = document.getElementById('setupBanner');
  const hdr = document.querySelector('.hdr');
  const monthBar = document.querySelector('.month-bar');
  
  let bannerH = (banner && !banner.classList.contains('hidden')) ? banner.offsetHeight : 0;
  
  if (hdr) hdr.style.top = bannerH + 'px';
  if (monthBar) monthBar.style.top = (bannerH + (hdr ? hdr.offsetHeight : 0)) + 'px';
  
  updateStickyTop();
}

window.addEventListener('load', updateAllStickyTops);
window.addEventListener('resize', updateAllStickyTops);
